# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: aniruddha-portfolio
  labels:
    app: aniruddha-portfolio


# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aniruddha-portfolio
  namespace: aniruddha-portfolio
  labels:
    app: aniruddha-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aniruddha-portfolio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aniruddha-portfolio
    spec:
      containers:
        - name: aniruddha-portfolio
          image: ghcr.io/NeoHexene/aniruddha-portfolio:latest   # Update with your GitHub username
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10


# Service
apiVersion: v1
kind: Service
metadata:
  name: aniruddha-portfolio-svc
  namespace: aniruddha-portfolio
spec:
  selector:
    app: aniruddha-portfolio
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP


# Ingress (using nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aniruddha-portfolio-ingress
  namespace: aniruddha-portfolio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod   # If using cert-manager for TLS
spec:
  ingressClassName: nginx
  rules:
    - host: aniruddha.dev   # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aniruddha-portfolio-svc
                port:
                  number: 80
  # Uncomment after setting up cert-manager:
  # tls:
  #   - hosts:
  #       - aniruddha.dev
  #     secretName: portfolio-tls


# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aniruddha-portfolio-hpa
  namespace: aniruddha-portfolio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aniruddha-portfolio
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70